<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teamville — Your Team's Week, Replayed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a24;
      --surface2:  #1e2435;
      --border:    #2a3050;
      --text:      #c8d0e8;
      --text-dim:  #6b7394;
      --accent:    #4f8ef7;
      --gold:      #f5c518;
      --red:       #e05252;
      --green:     #52c27a;
      --bar-rec:   #4da6ff;
      --bar-rel:   #f5a623;
      --bar-imp:   #c87ef5;
      --font:      'Segoe UI', system-ui, sans-serif;
      --mono:      'Cascadia Code', 'Fira Mono', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    /* ── Game canvas container — fills the full viewport so Phaser FIT ──
       centers the 960×640 canvas inside it with letterboxing. The canvas
       will never overflow or be cut off; on small screens it shrinks to fit,
       on large screens it scales up to the available space. */
    #game-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      image-rendering: pixelated;
      /* Phaser injects the <canvas> as a child; it handles centering via
         the Scale Manager (CENTER_BOTH). We just need to give it full room. */
    }

    /* ── HUD row — pinned to the viewport top, full width, overlays the canvas ── */
    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 10px;
      background: rgba(13,15,20,0.82);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      pointer-events: none; /* children re-enable as needed */
    }

    #sim-clock {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      white-space: nowrap;
      min-width: 200px;
      pointer-events: none;
    }

    #scrubber {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
      pointer-events: all;
      height: 4px;
    }

    #speed-label {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Interview panel overlay — viewport-relative, slides in from the right ──
       Width uses clamp() so it's comfortable on 13" (≥340px) without being
       absurdly wide on large external displays (≤480px). Height fills the full
       viewport; the .iv-pane sections internally scroll so content never clips. */
    #interview-overlay {
      position: fixed;
      top: 0; right: 0;
      width: clamp(340px, 33vw, 480px);
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: none;
      flex-direction: column;
      z-index: 20;
      overflow: hidden;
    }
    #interview-overlay.open { display: flex; }

    /* Agent header */
    #iv-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #iv-avatar {
      width: 40px; height: 40px;
      image-rendering: pixelated;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    #iv-name  { font-weight: 600; font-size: 15px; }
    #iv-role  { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    #iv-close {
      margin-left: auto;
      background: none; border: none;
      color: var(--text-dim); font-size: 20px;
      cursor: pointer; line-height: 1;
    }
    #iv-close:hover { color: var(--text); }
    #iv-close:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

    /* Tabs */
    #iv-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .iv-tab {
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      background: none;
      border-top: none; border-left: none; border-right: none;
    }
    .iv-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .iv-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

    /* Tab panes */
    .iv-pane { display: none; flex: 1; overflow-y: auto; padding: 12px; }
    .iv-pane.active { display: flex; flex-direction: column; gap: 10px; }

    /* Question input area */
    #iv-input-row {
      display: flex; gap: 8px;
      flex-shrink: 0;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }
    #iv-question {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      resize: none;
      height: 40px;
      font-family: var(--font);
    }
    #iv-question:focus { border-color: var(--accent); }
    #iv-ask {
      background: var(--accent);
      border: none; border-radius: 6px;
      color: #fff; font-size: 13px; font-weight: 600;
      padding: 0 14px; cursor: pointer;
      white-space: nowrap;
    }
    #iv-ask:disabled { opacity: 0.4; cursor: default; }
    #iv-ask:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

    /* Answer area */
    #iv-answer-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.6;
      min-height: 60px;
      white-space: pre-wrap;
      display: none;
    }
    #iv-answer-box.visible { display: block; }

    /* Verdict badge */
    #iv-verdict {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      display: none;
      align-self: flex-start;
    }
    #iv-verdict.pass  { background: #1a3a2a; color: var(--green); display: inline-block; }
    #iv-verdict.block { background: #3a1a1a; color: var(--red);   display: inline-block; }
    #iv-verdict.declined { background: #2a2a1a; color: var(--gold); display: inline-block; }

    /* Citation chips */
    .citation-chip {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 11px;
      border-radius: 3px;
      padding: 1px 5px;
      cursor: pointer;
      margin: 0 1px;
      font-family: var(--mono);
      vertical-align: baseline;
    }
    .citation-chip:hover { background: var(--accent); color: #fff; }
    .citation-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Citation expansion card */
    .citation-expand {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }
    .citation-expand.open { display: block; }
    .citation-expand .cit-ts { color: var(--text-dim); font-size: 11px; margin-bottom: 4px; font-family: var(--mono); }
    .citation-expand .cit-ref { color: var(--accent); font-size: 11px; margin-top: 4px; }

    /* Threshold line (decline gate) */
    #iv-threshold-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    #iv-threshold-bar.visible { display: flex; }
    .threshold-label {
      font-size: 11px;
      color: var(--red);
      white-space: nowrap;
    }
    .threshold-line {
      flex: 1;
      height: 1px;
      background: var(--red);
    }

    /* Memory cards */
    .memory-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s ease, transform 0.2s ease, border-color 0.2s;
    }
    .memory-card.visible { opacity: 1; transform: translateY(0); }
    .memory-card.top-set { border-color: var(--gold); background: #1a1800; }
    .memory-card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .memory-kind-icon { font-size: 14px; }
    .memory-text { color: var(--text); }
    .memory-bars { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
    .memory-bar-row { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-dim); }
    .memory-bar-label { width: 54px; text-align: right; }
    .memory-bar-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .memory-bar-fill  { height: 100%; border-radius: 2px; transition: width 0.4s ease; width: 0; }
    .bar-rec { background: var(--bar-rec); }
    .bar-rel { background: var(--bar-rel); }
    .bar-imp { background: var(--bar-imp); }
    .memory-score { font-size: 10px; color: var(--text-dim); font-family: var(--mono); margin-top: 4px; }
    .memory-evidence { font-size: 11px; color: var(--accent); margin-top: 4px; cursor: pointer; }
    .memory-evidence:hover { text-decoration: underline; }
    .memory-evidence:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

    /* Memories tab — thought list */
    .thought-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
    }
    .thought-kind { font-size: 10px; color: var(--bar-imp); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .thought-text { color: var(--text); line-height: 1.5; }
    .thought-evidence { margin-top: 6px; font-size: 11px; color: var(--text-dim); }
    .ev-link { color: var(--accent); cursor: pointer; margin: 0 2px; }
    .ev-link:hover { text-decoration: underline; }
    .ev-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

    /* Status / loading */
    #iv-status {
      font-size: 12px;
      color: var(--text-dim);
      padding: 6px 0;
      min-height: 20px;
    }

    /* Pipeline stepper */
    #iv-stepper {
      display: none;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
    }
    #iv-stepper.visible { display: flex; }
    .step-item { display: flex; align-items: center; gap: 6px; }
    .step-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .step-item.done .step-dot   { background: var(--green); }
    .step-item.active .step-dot { background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Memory trace collapsible section */
    .iv-trace-details {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .iv-trace-details[open] { background: var(--bg); }
    .iv-trace-summary {
      padding: 6px 10px;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .iv-trace-summary::-webkit-details-marker { display: none; }
    .iv-trace-summary::before {
      content: '▶';
      font-size: 9px;
      transition: transform 0.15s ease;
      display: inline-block;
    }
    .iv-trace-details[open] .iv-trace-summary::before { transform: rotate(90deg); }
    .iv-trace-summary:hover { color: var(--text); }
    .iv-trace-summary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    #iv-memory-cards { padding: 6px 8px 8px; display: flex; flex-direction: column; gap: 6px; }
    #iv-threshold-bar { margin: 4px 8px; }

    /* Event jump dropdown */
    #event-jump {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 11px;
      font-family: var(--font);
      padding: 2px 6px;
      height: 22px;
      cursor: pointer;
      pointer-events: all;
      max-width: 260px;
      outline: none;
    }
    #event-jump:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    #event-jump:hover { border-color: var(--accent); }
    #event-jump option { background: var(--surface2); color: var(--text); }
    #event-jump optgroup { background: var(--surface); color: var(--text-dim); font-style: normal; }

    /* Play/pause button in HUD */
    #play-pause-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      font-size: 14px;
      width: 28px; height: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    #play-pause-btn:hover { background: var(--surface2); }
    #play-pause-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Scrollbar styling */
    .iv-pane::-webkit-scrollbar { width: 6px; }
    .iv-pane::-webkit-scrollbar-track { background: var(--bg); }
    .iv-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (prefers-reduced-motion: reduce) {
      .memory-card { transition: none; }
      .memory-bar-fill { transition: none; }
      .step-item.active .step-dot { animation: none; }
      .iv-trace-summary::before { transition: none; }
    }
  </style>
</head>
<body>

  <!-- HUD (clock + scrubber + play/pause) sits above canvas -->
  <div id="hud">
    <span id="sim-clock">Mon 09:00 UTC</span>
    <button id="play-pause-btn" aria-label="Play or pause simulation">&#9654;</button>
    <input id="scrubber" type="range"
           min="1749376800000"
           max="1749754800000"
           step="60000"
           value="1749376800000"
           aria-label="Simulation timeline scrubber" />
    <span id="speed-label">1×</span>
    <select id="event-jump" aria-label="Jump to scheduled event">
      <option value="">Jump to event…</option>
    </select>
  </div>

  <!-- Phaser canvas mounts here -->
  <!-- tabindex="-1" allows programmatic focus return after closing interview panel -->
  <div id="game-container" tabindex="-1" aria-label="Teamville simulation canvas" role="img"></div>

  <!-- Interview panel overlay (DOM, not canvas) -->
  <!-- role="dialog" is correct: this is a non-modal supplementary panel. We keep
       role="dialog" without aria-modal="true" so the village canvas remains
       reachable. aria-label is updated dynamically when a specific agent is opened. -->
  <div id="interview-overlay" role="dialog" aria-label="Agent interview panel">

    <div id="iv-header">
      <canvas id="iv-avatar" width="40" height="40" aria-hidden="true"></canvas>
      <div>
        <div id="iv-name" aria-live="polite">—</div>
        <div id="iv-role">—</div>
      </div>
      <button id="iv-close" aria-label="Close interview panel">×</button>
    </div>

    <div id="iv-tabs" role="tablist" aria-label="Interview sections">
      <button id="tab-interview" class="iv-tab active" data-tab="interview"
              role="tab" aria-selected="true"
              aria-controls="pane-interview">Interview</button>
      <button id="tab-memories"  class="iv-tab"        data-tab="memories"
              role="tab" aria-selected="false"
              aria-controls="pane-memories">Memories</button>
    </div>

    <!-- Interview tab -->
    <div id="pane-interview" class="iv-pane active" role="tabpanel"
         aria-labelledby="tab-interview">
      <div id="iv-status" role="status" aria-live="polite" aria-atomic="true"></div>

      <!-- Pipeline stepper (shows while waiting for response) -->
      <div id="iv-stepper" aria-live="polite" aria-label="Answer pipeline progress">
        <div class="step-item" data-step="embed">  <div class="step-dot" aria-hidden="true"></div><span>Embedding question…</span></div>
        <div class="step-item" data-step="score">  <div class="step-dot" aria-hidden="true"></div><span>Scoring memories…</span></div>
        <div class="step-item" data-step="gate">   <div class="step-dot" aria-hidden="true"></div><span>Relevance gate…</span></div>
        <div class="step-item" data-step="draft">  <div class="step-dot" aria-hidden="true"></div><span>Drafting answer…</span></div>
        <div class="step-item" data-step="judge">  <div class="step-dot" aria-hidden="true"></div><span>Judge verifying…</span></div>
      </div>

      <!-- Answer (typewriter renders here after judge passes) — ABOVE trace -->
      <div id="iv-answer-box" aria-live="polite" aria-atomic="false"></div>

      <!-- Verdict badge — directly below answer -->
      <div id="iv-verdict" aria-live="polite" aria-atomic="true"></div>

      <!-- Collapsible memory trace section — secondary, below the answer -->
      <details id="iv-trace-section" class="iv-trace-details">
        <summary id="iv-trace-summary" class="iv-trace-summary">How it retrieved this</summary>
        <!-- Threshold line for declined answers (inside the details, visible when open) -->
        <div id="iv-threshold-bar">
          <span class="threshold-label">↑ no memories above relevance threshold (0.25) ↑</span>
          <div class="threshold-line" aria-hidden="true"></div>
        </div>
        <!-- Memory trace cards (animate in) -->
        <div id="iv-memory-cards"></div>
      </details>
    </div>

    <!-- Memories tab -->
    <div id="pane-memories" class="iv-pane" role="tabpanel"
         aria-labelledby="tab-memories">
      <div id="iv-memories-list"></div>
    </div>

    <!-- Question input (always visible at bottom) -->
    <div id="iv-input-row">
      <textarea id="iv-question"
                placeholder="Ask a question…"
                rows="1"
                aria-label="Interview question"></textarea>
      <button id="iv-ask" aria-label="Ask interview question">Ask</button>
    </div>

  </div>

  <!-- Village Log — screen-reader accessible transcript of village activity -->
  <div id="village-log"
       role="log"
       aria-live="polite"
       aria-label="Village activity log"
       style="
         position:absolute; left:-9999px; top:-9999px;
         width:1px; height:1px; overflow:hidden;
       ">
    <!-- Populated by VillageScene when agents move or speech bubbles appear -->
  </div>

  <!-- Phaser 3.90.0 — pinned CDN, no build step for Phaser itself -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <!-- Game bundle — TypeScript source compiled by esbuild (npm run build:web) -->
  <script src="game/dist/bundle.js"></script>
</body>
</html>
